name: Daily Prediction Pipeline

on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC = 12:00 Myanmar time (UTC+6:30)
  workflow_dispatch:        # allow manual trigger
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'          # skip if only docs changed (avoids self-triggering loop)
      - 'data/**'          # skip if only data changed (same reason)

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction pipeline
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TZ: Asia/Rangoon
        run: python -m src.pipeline

      - name: Commit updated data and HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "data: daily update $(date -u +%Y-%m-%d)"
          git push
